<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCALPING GOLD</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050810;
  color:white;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#0b1220;
  border:1px solid #1c2435;
  border-radius:15px;
  padding:25px;
  margin:20px 0;
}

.title{
  color:#D4AF37;
  font-size:22px;
  margin-bottom:10px;
}

.number{
  font-size:35px;
  font-weight:bold;
}

canvas{
  background:#0b1220;
  border-radius:15px;
  padding:15px;
}

.loading{
  margin-top:30px;
  font-size:18px;
  color:#D4AF37;
}
</style>
</head>

<body>

<div class="container">

<h1 style="color:#D4AF37;">SCALPING GOLD RESULTS</h1>

<div class="card">
<div class="title">اليومي</div>
<div class="number" id="daily">0</div>
</div>

<div class="card">
<div class="title">الأسبوعي</div>
<div class="number" id="weekly">0</div>
</div>

<div class="card">
<div class="title">الشهري</div>
<div class="number" id="monthly">0</div>
</div>

<div class="card">
<div class="title">السنوي</div>
<div class="number" id="yearly">0</div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="loading" id="loading">جاري تحميل البيانات...</div>

</div>

<script>

fetch("data.json")
.then(res => res.json())
.then(data => {

document.getElementById("loading").style.display="none";

const today = new Date();
const currentYear = today.getFullYear();
const currentMonth = today.getMonth();
const currentDate = today.toISOString().split("T")[0];

let daily=0;
let weekly=0;
let monthly=0;
let yearly=0;

const sevenDaysAgo = new Date();
sevenDaysAgo.setDate(today.getDate()-7);

let labels=[];
let values=[];

data.days.forEach(day=>{

const dateObj = new Date(day.date);
const net = day.profit - day.loss;

labels.push(day.date);
values.push(net);

if(day.date===currentDate){
daily+=net;
}

if(dateObj>=sevenDaysAgo){
weekly+=net;
}

if(dateObj.getMonth()===currentMonth && dateObj.getFullYear()===currentYear){
monthly+=net;
}

if(dateObj.getFullYear()===currentYear){
yearly+=net;
}

});

document.getElementById("daily").innerText=daily;
document.getElementById("weekly").innerText=weekly;
document.getElementById("monthly").innerText=monthly;
document.getElementById("yearly").innerText=yearly;

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"النقاط",
data:values,
borderColor:"#D4AF37",
backgroundColor:"rgba(212,175,55,0.2)",
fill:true,
tension:0.4
}]
},
options:{
responsive:true,
plugins:{
legend:{display:false}
}
}
});

})
.catch(err=>{
document.getElementById("loading").innerText="خطأ في تحميل data.json";
console.error(err);
});

</script>

</body>
</html>
