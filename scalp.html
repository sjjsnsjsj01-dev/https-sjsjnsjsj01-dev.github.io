<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SCALP SYSTEM</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>body{    margin:0;    font-family:Arial;    background:#0b0f1a;    color:#fff;    overflow-x:hidden;}.loader{    position:fixed;    inset:0;    background:#0b0f1a;    display:flex;    flex-direction:column;    align-items:center;    justify-content:center;    z-index:9999;}.spinner{    width:60px;    height:60px;    border:5px solid #333;    border-top:5px solid #D4AF37;    border-radius:50%;    animation:spin 1s linear infinite;}@keyframes spin{    to{transform:rotate(360deg);}}.container{    padding:20px;    max-width:1200px;    margin:auto;}.card{    background:#111827;    padding:20px;    border-radius:12px;    margin-bottom:20px;}h1{    color:#D4AF37;}.stat{    font-size:22px;    margin:10px 0;}canvas{    background:#111827;    padding:15px;    border-radius:12px;}#backBtn{    position:fixed;    bottom:20px;    left:20px;    background:#D4AF37;    color:#000;    padding:12px 18px;    border-radius:50px;    text-decoration:none;    font-weight:bold;    transition:0.3s;}#backBtn.hidden{    transform:translateY(120px);}</style></head><body><div class="loader" id="loader">    <div class="spinner"></div>    <p style="margin-top:20px;color:#D4AF37;">جاري تحميل البيانات المؤسسية...</p></div><div class="container"><h1>نظام سكالب احترافي</h1><div class="card">    <div class="stat">ربح اليوم: <span id="todayProfit">0</span> PIP</div>    <div class="stat">ربح هذا الأسبوع: <span id="weekProfit">0</span> PIP</div>    <div class="stat">ربح هذا الشهر: <span id="monthProfit">0</span> PIP</div></div><div class="card">    <canvas id="mainChart"></canvas></div></div><a href="index.html" id="backBtn">الرئيسية</a><script>let lastScrollTop = 0;const backBtn = document.getElementById("backBtn");window.addEventListener("scroll", function() {  let currentScroll = window.pageYOffset || document.documentElement.scrollTop;  if (currentScroll > lastScrollTop && currentScroll > 50) {    backBtn.classList.add("hidden");  } else {    backBtn.classList.remove("hidden");  }  lastScrollTop = currentScroll <= 0 ? 0 : currentScroll;});async function loadData(){    try{        const response = await fetch("data.json");        const data = await response.json();        const days = data.days;        const today = new Date().toISOString().split("T")[0];        let todayProfit = 0;        let weekProfit = 0;        let monthProfit = 0;        const now = new Date();        const currentMonth = now.getMonth();        const currentYear = now.getFullYear();        let labels = [];        let values = [];        let cumulative = 0;        days.forEach(day => {            const dateObj = new Date(day.date);            const profit = day.profit - day.loss;            cumulative += profit;            labels.push(day.date);            values.push(cumulative);            if(day.date === today){                todayProfit = profit;            }            const diffDays = (now - dateObj) / (1000*60*60*24);            if(diffDays <= 7){                weekProfit += profit;            }            if(dateObj.getMonth() === currentMonth && dateObj.getFullYear() === currentYear){                monthProfit += profit;            }        });        document.getElementById("todayProfit").innerText = todayProfit;        document.getElementById("weekProfit").innerText = weekProfit;        document.getElementById("monthProfit").innerText = monthProfit;        const ctx = document.getElementById("mainChart").getContext("2d");        new Chart(ctx,{            type:'line',            data:{                labels:labels,                datasets:[{                    label:'النمو التراكمي',                    data:values,                    borderColor:'#D4AF37',                    backgroundColor:'rgba(212,175,55,0.2)',                    borderWidth:2,                    tension:0.4,                    fill:true,                    pointRadius:3                }]            },            options:{                responsive:true,                plugins:{                    legend:{display:true}                },                scales:{                    x:{ticks:{color:'#fff'}},                    y:{ticks:{color:'#fff'}}                }            }        });        document.getElementById("loader").style.display="none";    }catch(error){        console.error(error);    }}document.addEventListener("DOMContentLoaded", loadData);</script></body></html>
